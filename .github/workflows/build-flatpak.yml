name: Build Flatpak

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.3-test)'
        required: false
        default: 'v0.1.3-test'

  push:
    tags:
      - 'v*'

jobs:
  build-flatpak:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            flatpak \
            flatpak-builder \
            desktop-file-utils \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Flatpak
        run: |
          flatpak --user remote-add --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

          flatpak --user install -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Debug build output
        run: |
          echo "=== RELEASE FILES ==="
          ls -lah src-tauri/target/release

      - name: Prepare Flatpak files
        run: |
          mkdir -p flatpak/dist

          BINARY=$(find src-tauri/target/release -maxdepth 1 -type f -executable ! -name "*.so" ! -name "*.d" | head -n 1)

          echo "Using binary: $BINARY"

          cp "$BINARY" flatpak/dist/jira-desktop-unofficial

          chmod +x flatpak/dist/jira-desktop-unofficial

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --user \
            --force-clean \
            build-dir \
            flatpak/com.flagodna.JiraDesktopUnofficial.yml

      - name: Export Flatpak repository
        run: |
          flatpak build-export \
            repo \
            build-dir

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle \
            repo \
            jira-desktop-unofficial.flatpak \
            com.flagodna.JiraDesktopUnofficial

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: jira-desktop-unofficial-flatpak
          path: jira-desktop-unofficial.flatpak

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: jira-desktop-unofficial.flatpak
