name: Build Flatpak

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.3-test)'
        required: false
        default: 'v0.1.3-test'
  push:
    tags:
      - 'v*'

jobs:
  build-flatpak:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        run: |
          sudo apt update

          sudo apt install -y \
            flatpak \
            flatpak-builder \
            desktop-file-utils \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Install Flatpak runtime
        run: |
          flatpak remote-add --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

          flatpak install -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri Linux binary
        run: pnpm tauri build

      - name: Prepare Flatpak files
        run: |
          mkdir -p flatpak/dist

          cp src-tauri/target/release/jira-desktop-unofficial \
            flatpak/dist/

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            build-dir \
            flatpak/com.flagodna.JiraDesktopUnofficial.yml

      - name: Export Flatpak bundle
        run: |
          flatpak build-bundle \
            ~/.local/share/flatpak/repo \
            jira-desktop-unofficial.flatpak \
            com.flagodna.JiraDesktopUnofficial

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: jira-desktop-unofficial.flatpak
