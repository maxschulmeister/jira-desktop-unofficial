name: jira-desktop
base: core24
version: "0.1.2"
summary: Jira desktop client
description: A lightweight, native desktop client for Jira built with Tauri.
grade: stable
confinement: classic

title: Jira Desktop
license: MIT
contact: max@schulmeister.com
website: https://github.com/maxschulmeister/jira-desktop-unofficial

icon: snap/gui/icon.png

apps:
  jira-desktop:
    command: usr/bin/jira-desktop
    desktop: usr/share/applications/jira-desktop.desktop
    plugs:
      - network
      - network-bind
      - desktop

parts:
  jira-app:
    plugin: dump
    source: .
    override-build: |
      set -eux
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      mkdir -p $CRAFT_PART_INSTALL/usr/share/applications

      cp src-tauri/target/release/jira-desktop $CRAFT_PART_INSTALL/usr/bin/
      chmod +x $CRAFT_PART_INSTALL/usr/bin/jira-desktop

      echo "[Desktop Entry]" > $CRAFT_PART_INSTALL/usr/share/applications/jira-desktop.desktop
      echo "Name=Jira Desktop" >> $CRAFT_PART_INSTALL/usr/share/applications/jira-desktop.desktop
      echo "Exec=jira-desktop" >> $CRAFT_PART_INSTALL/usr/share/applications/jira-desktop.desktop
      echo "Icon=\${SNAP}/meta/gui/icon.png" >> $CRAFT_PART_INSTALL/usr/share/applications/jira-desktop.desktop
      echo "Type=Application" >> $CRAFT_PART_INSTALL/usr/share/applications/jira-desktop.desktop
      echo "Categories=Network;Office;" >> $CRAFT_PART_INSTALL/usr/share/applications/jira-desktop.desktop
      echo "Comment=Jira desktop client" >> $CRAFT_PART_INSTALL/usr/share/applications/jira-desktop.desktop
