app-id: com.maxschulmeister.Jira
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
command: jira
finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
modules:
  - name: jira
    buildsystem: simple
    build-commands:
      - install -Dm755 jira /app/bin/jira
    sources:
      - type: file
        path: dist/jira
