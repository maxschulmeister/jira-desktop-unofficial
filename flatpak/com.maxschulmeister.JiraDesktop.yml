app-id: com.maxschulmeister.JiraDesktop
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
command: jira-desktop
finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
modules:
  - name: jira-desktop
    buildsystem: simple
    build-commands:
      - install -Dm755 jira-desktop /app/bin/jira-desktop
    sources:
      - type: file
        path: dist/jira-desktop
