app-id: com.flagodna.JiraDesktopUnofficial
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk

command: jira-desktop-unofficial

finish-args:
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc 
  - --filesystem=xdg-run/gvfs
  - --filesystem=xdg-run/gvfsd

modules:
  - name: jira-desktop-unofficial
    buildsystem: simple
    build-commands:
      - install -Dm755 jira-desktop-unofficial /app/bin/jira-desktop-unofficial
    sources:
      - type: file
        path: dist/jira-desktop-unofficial
